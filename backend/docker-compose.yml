version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shipments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # Values are read from .env (gitignored) by Docker Compose automatically.
    # Copy .env.example to .env and adjust before running.
    # For non-sensitive vars, ${VAR:-default} provides a fallback.
    environment:
      PORT: "${PORT:-8080}"
      DATABASE_URL: "${DATABASE_URL}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      - db

volumes:
  pgdata:
