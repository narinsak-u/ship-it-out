version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shipments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://user:pass@db:5432/shipments"
      CORS_ORIGIN: "http://localhost:5173"
      # Override JWT_SECRET with a 64-char hex string for production
      JWT_SECRET: "b333310df93f8974ae8dd3ef938e1345ebfafb02137e52b729ad98caacffd8f3"
    depends_on:
      - db

volumes:
  pgdata:
